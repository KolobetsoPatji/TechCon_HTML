<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <title>Contact Us - TechCon 2024</title>
</head>

<body>

<header>
    <h1>Contact Us</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="schedule.html">Schedule</a>
        <a href="register.html">Register</a>
    </nav>
</header>

<main>
    <!-- Contact Info -->
    <section>
        <h2>Get in Touch</h2>
        <p>Email us at: <a href="mailto:email@example.com">email@example.com</a></p>

        <!-- Social Media Links -->
        <p>
            Follow us:
            <a href="https://twitter.com/TechCon2024" target="_blank">Twitter</a> |
            <a href="https://linkedin.com/company/TechCon2024" target="_blank">LinkedIn</a> |
            <a href="https://facebook.com/TechCon2024" target="_blank">facebook</a>
         </p>
    </section>

    <section>
        <h2>Venue Location</h2>
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.019960404027!2d-122.40121748468153!3d37.79362077975688!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80858064a8b2cba5%3A0x8f0b4b1cc5b1ed2!2sMoscone%20Center%2C520San%20Francisco%2C%20CA!5e0!3m2!1sen!2sus!4v1700000000000!5m2!sen!2sus"
            width="600"
            height="450"
            style="border:0;"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </section>

    <!-- Contact Form -->
    <section>
        <h2>Contact Us Form</h2>
        <form>
            <label for="name">Full Name:</label><br>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5" required></textarea><br><br>

            <button type="submit">Send Message</button>
        </form>
    </section>

</main>
<footer>
    <p>Copyright TechCon 2024</p>
</footer>

</body>
</html>
